name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create swap file
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - uses: dart-lang/setup-dart@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate API docs
        run: |
          # Create empty header/footer files expected by --sdk-docs
          sudo mkdir -p /opt/hostedtoolcache/tools/bots
          sudo touch /opt/hostedtoolcache/tools/bots/dartdoc_header.html
          sudo touch /opt/hostedtoolcache/tools/bots/dartdoc_footer.html

          git clone https://github.com/777genius/dartdoc_vitepress.git /tmp/dartdoc-vitepress
          cd /tmp/dartdoc-vitepress && dart pub get
          dart run /tmp/dartdoc-vitepress/bin/dartdoc_vitepress.dart \
            --sdk-docs --format vitepress --output "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm install

      - name: Build VitePress
        env:
          NODE_OPTIONS: "--max-old-space-size=12288"
        run: npx vitepress build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
