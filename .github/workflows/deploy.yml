name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space and increase swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h /

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart pub global path
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Generate API docs
        run: |
          # Create empty header/footer files expected by --sdk-docs
          for d in /opt/hostedtoolcache/tools/bots "$FLUTTER_ROOT/tools/bots"; do
            sudo mkdir -p "$d"
            for f in dartdoc_header.html dartdoc_footer.html dartdoc_footer_text.html; do
              sudo touch "$d/$f"
            done
          done

          dart pub global activate --source git https://github.com/777genius/dartdoc_modern.git
          dart pub global run dartdoc_modern \
            --sdk-docs --format jaspr --output docs-site

      # dartdoc_modern generates web/guide/<name>.html with <meta http-equiv="refresh">.
      # On GitHub Pages these .html files take priority over Jaspr SSR
      # guide/<name>/index.html, causing an infinite redirect loop.
      # DO NOT REMOVE this step - the redirect loop WILL come back.
      - name: Remove legacy guide redirect files
        run: find docs-site/web/guide -name '*.html' -delete 2>/dev/null || true

      - name: Install docs dependencies
        working-directory: docs-site
        run: dart pub get

      - name: Build docs (jaspr)
        working-directory: docs-site
        run: dart run jaspr_cli:jaspr build --dart-define DOCS_BASE_PATH=/dart-sdk-api
        timeout-minutes: 15

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build/jaspr

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
