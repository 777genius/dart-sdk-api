name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space and increase swap
        run: |
          # Remove large preinstalled software to free RAM and disk
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true

          # Increase swap to 20GB
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "=== Memory ==="
          free -h
          echo "=== Disk ==="
          df -h /

      - uses: dart-lang/setup-dart@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate API docs
        run: |
          # Create empty header/footer files expected by --sdk-docs
          sudo mkdir -p /opt/hostedtoolcache/tools/bots
          for f in dartdoc_header.html dartdoc_footer.html dartdoc_footer_text.html; do
            sudo touch /opt/hostedtoolcache/tools/bots/$f
          done

          dart pub global activate dartdoc_modern
          dart pub global run dartdoc_modern \
            --sdk-docs --format vitepress --output "$GITHUB_WORKSPACE"

      - name: Install dependencies
        run: npm install

      - name: Build VitePress
        env:
          NODE_OPTIONS: "--max-old-space-size=24576"
        run: npx vitepress build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
